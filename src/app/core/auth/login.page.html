<main class="min-h-screen flex flex-col items-center justify-center bg-byzantine-50 p-6">
  <div class="text-center space-y-8 max-w-lg w-full">
    <header class="space-y-3">
      <h1
        class="flex items-center justify-center gap-3 text-3xl sm:text-5xl font-semibold text-primary font-title"
      >
        <img
          ngSrc="/logo.png"
          width="48"
          height="48"
          alt="Orthodox cross"
          priority
          class="w-8 h-8 sm:w-12 sm:h-12"
        />
        Orthodox Prayer Wall
      </h1>
      <p class="text-byzantine-600 text-sm">Sign in to submit and manage prayer requests</p>
    </header>

    <button
      type="button"
      class="hover:cursor-pointer w-full flex items-center justify-center gap-3 px-6 py-3 bg-white border border-byzantine-300 rounded-lg shadow-sm text-byzantine-800 font-medium hover:bg-byzantine-50 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-byzantine-600 transition-colors"
      (click)="login()"
    >
      <svg aria-hidden="true" width="20" height="20" viewBox="0 0 48 48">
        <path
          fill="#4285F4"
          d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"
        />
      </svg>
      Sign in with Google
    </button>

    @if (authService.error()) {
      <p role="alert" class="text-red-600 text-sm mt-2">{{ authService.error() }}</p>
    }
  </div>
</main>
