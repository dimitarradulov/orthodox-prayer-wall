<article
  class="bg-white rounded-xl shadow-sm border border-primary/10 p-6 flex flex-col gap-4 hover:shadow-md transition-shadow"
>
  <header class="flex items-center justify-between">
    <span
      class="text-xs font-semibold uppercase tracking-wide text-accent bg-accent/10 px-3 py-1 rounded-full"
    >
      {{ prayer().category }}
    </span>
    <time class="text-xs text-gray-400" [attr.datetime]="prayer().createdAt.toISOString()">
      {{ getRelativeDate(prayer().createdAt) }}
    </time>
  </header>

  <p class="font-prayer text-gray-800 leading-relaxed flex-1">{{ prayer().request }}</p>

  <footer class="flex items-center justify-between">
    <span class="text-sm text-gray-500">— {{ prayer().name }}</span>
    <button
      type="button"
      class="cursor-pointer flex items-center gap-2 bg-primary text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-primary/90 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
      [attr.aria-label]="'Pray for ' + prayer().name + ', ' + prayer().prayerCount + ' prayers lit'"
      (click)="onPray()"
    >
      <span aria-hidden="true">🕯️</span>
      <span>Pray</span>
      <span class="bg-white/20 rounded px-1.5 py-0.5 text-xs">{{ prayer().prayerCount }}</span>
    </button>
  </footer>
</article>
