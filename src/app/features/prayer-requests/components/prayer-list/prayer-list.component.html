@if (prayers().length > 0) {
  <ul
    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
    role="list"
    aria-label="Prayer requests"
  >
    @for (prayer of prayers(); track prayer.id) {
      <li>
        <app-prayer-card
          [prayer]="prayer"
          [currentUserId]="currentUserId()"
          (prayerClicked)="prayerClicked.emit($event)"
          (deleteClicked)="deleteClicked.emit($event)"
          (editClicked)="editClicked.emit($event)"
          (viewClicked)="viewClicked.emit($event)"
        />
      </li>
    }
  </ul>
} @else {
  <p class="text-center text-gray-500 py-16">No prayer requests yet. Be the first to share.</p>
}
