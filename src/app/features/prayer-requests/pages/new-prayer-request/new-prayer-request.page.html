<div class="mx-auto max-w-2xl px-4 py-8">
  <h1 class="font-title mb-6 text-2xl font-semibold text-primary">Request a Prayer</h1>

  @if (errorMessage()) {
    <div class="mb-4 rounded border border-red-300 bg-red-50 p-3 text-red-800" role="alert">
      {{ errorMessage() }}
    </div>
  }

  <app-prayer-request-form
    submitLabel="Submit Prayer Request"
    [submitting]="submitting()"
    (formSubmitted)="onSubmit($event)"
  />
</div>
