<main class="bg-background min-h-screen px-4 py-12 max-w-7xl mx-auto">
  <header class="mb-10">
    <h1 class="font-title text-3xl text-primary">Prayer Requests</h1>
    <p class="text-gray-500 mt-1">Lift up your brothers and sisters in prayer</p>
  </header>

  @if (actionError()) {
    <div
      role="alert"
      class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"
    >
      {{ actionError() }}
    </div>
  }

  @if (store.hasPrayerRequests()) {
    <div
      infiniteScroll
      [infiniteScrollDistance]="2"
      [infiniteScrollThrottle]="200"
      (scrolled)="store.loadMore()"
    >
      <app-prayer-list
        [prayers]="store.prayerRequests()"
        [currentUserId]="currentUserId()"
        (prayerClicked)="onPray($event)"
        (deleteClicked)="onDelete($event)"
        (viewClicked)="onView($event)"
        (editClicked)="onEdit($event)"
      />
    </div>

    @if (store.loading()) {
      <app-loading-spinner />
    }
  } @else {
    @if (store.loading()) {
      <app-loading-spinner />
    } @else if (store.error()) {
      <div class="flex flex-col items-center justify-center py-20 text-gray-500" role="alert">
        <p class="text-lg mb-4">Something went wrong loading prayers.</p>
        <button
          type="button"
          class="cursor-pointer bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
          (click)="store.loadInitial()"
        >
          Try again
        </button>
      </div>
    }
  }
</main>

<app-confirm-dialog #confirmDialog (confirmed)="confirmDelete()" (cancelled)="cancelDelete()" />
