<dialog
  #dialog
  role="alertdialog"
  aria-labelledby="confirm-delete-title"
  aria-describedby="confirm-delete-desc"
  class="m-auto rounded-xl p-0 backdrop:bg-black/50 shadow-lg max-w-md w-full"
  (click)="onDialogClick($event)"
  (keydown.escape)="onCancel()"
>
  <div class="p-6">
    <h2 id="confirm-delete-title" class="font-title text-lg text-primary mb-2">
      Delete Prayer Request
    </h2>
    <p id="confirm-delete-desc" class="text-gray-600 mb-6">
      Are you sure you want to delete this prayer request? This action cannot be undone.
    </p>
    <div class="flex justify-end gap-3">
      <button
        type="button"
        class="cursor-pointer px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
        (click)="onCancel()"
      >
        Cancel
      </button>
      <button
        type="button"
        class="cursor-pointer px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-red-600 focus-visible:ring-offset-2"
        (click)="onConfirm()"
      >
        Delete
      </button>
    </div>
  </div>
</dialog>
